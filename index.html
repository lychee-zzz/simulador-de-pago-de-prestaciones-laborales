<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Pago de Prestaciones Laborales</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="sectionFormulario">
<div class="introduccion">
    <h1>Simulador de Pago de Prestaciones Laborales</h1>

    <p>
        Ingrese la información solicitada para calcular el pago de sus
        prestaciones laborales.
    </p>
</div>
<div>
    <form class="formulario">

        <div class="campo">
            <label for="nombreCompleto">Nombre Completo:</label>
            <input type="text" id="nombreCompleto" required>
        </div>

        <div class="campo">
            <label for="edad">Edad:</label>
            <input type="number" id="edad" required>
        </div>
        <div class="campo">
            <label for="tipoDeDocumento">Tipo de Documento:</label>

            <select id="tipoDeDocumento" required>
                <option value="noSeleccionado">Seleccione</option>
                <option value="rc">Registro Civil</option>
                <option value="ti">Tarjeta de Identidad</option>
                <option value="cc">Cédula de Ciudadanía</option>
                <option value="ce">Cédula de Extranjería</option>
                <option value="pp">Pasaporte</option>
            </select>
        </div>

        <div class="campo">
            <label for="numeroDeDocumento">Número de Documento:</label>
            <input type="number" id="numeroDeDocumento" required>
        </div>

<!-- datos laborales -->

    <div id="datosLaborales">  

        <div class="campo">
            <label for="salario">Salario:</label>
            <input type="number" id="salario" required>
        </div>

        <div class="campo">
            <label for="comisiones">Comisiones:</label>
            <input type="number" id="comisiones">
        </div>

        <div class="campo">
            <label for="totalDeHorasExtras">Horas Extras:</label>
            <input type="number" id="totalDeHorasExtras">
        </div>

        <div class="campo">
            <label for="clasificacionDeNivelDeRiesgo">
                Nivel de Riesgo ARL:
            </label>

            <select id="clasificacionDeNivelDeRiesgo" required>
                <option value="">Seleccione</option>
                <option value="1">Nivel 1</option>
                <option value="2">Nivel 2</option>
                <option value="3">Nivel 3</option>
                <option value="4">Nivel 4</option>
                <option value="5">Nivel 5</option>
            </select>
        </div>
        </div>
        <div>
          
        <div class="campo" id="campoMesada">
            <label for="mesadaPensional">Mesada Pensional:</label>
            <input type="number" id="mesadaPensional" placeholder="Solo para mayores de 60 años">
        </div>

        <button type="button" onclick="calcular()">
            Calcular
        </button>
</div>
    </form>
</div>

<div id="resultado">

    <h2>Resultado del cálculo</h2>

    <p id="nombreResultado"></p>

    <p id="documentoResultado"></p>

    <p id="salarioResultado"></p>

    <p id="auxilioResultado"></p>

    <p id="comisionesResultado"></p>

    <p id="horasResultado"></p>

    <p id="devengadoResultado"></p>

    <p id="ibcResultado"></p>

    <p id="saludResultado"></p>

    <p id="pensionResultado"></p>

    <p id="fondoResultado"></p>

    <p id="arlResultado"></p>

    <p id="deduccionesResultado"></p>

    <p id="totalResultado"></p>

</div>

</section>

<script src="script.js"></script>

</body>
</html>
